<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>LOVE20 Chat Prototype</title>
    <link rel="stylesheet" href="./styles.css?v=20260523-7">
  </head>
  <body>
    <div class="app-shell" data-entry="love20-chat">
      <main class="phone-frame">
        <header class="app-header">
          <button class="icon-button" type="button" data-action="go-back" aria-label="返回">&lt;</button>
          <div class="app-title">
            <strong id="screen-title"></strong>
            <span id="screen-subtitle"></span>
          </div>
          <button class="wallet-button" type="button" id="wallet-button" data-action="toggle-wallet">0x8b...91</button>
        </header>

        <section class="workspace-screen" id="workspace-screen" aria-label="爱聊工作区"></section>
        <section class="message-list" id="message-list" aria-label="消息列表" hidden></section>

        <div class="status-strip" id="status-strip"></div>

        <footer class="composer" id="composer" hidden>
          <div class="composer-chips" id="composer-chips"></div>
          <div class="composer-row">
            <input id="composer-input" class="composer-input" placeholder="输入公开链上消息" aria-label="消息内容">
            <button class="send-button" type="button" id="send-button">发送</button>
          </div>
        </footer>
        <footer class="composer-banned" id="composer-banned" hidden></footer>

        <nav class="bottom-nav" id="bottom-nav" aria-label="底部导航"></nav>
      </main>

      <div class="status-sheet" id="status-sheet" hidden>
        <div class="sheet-handle"></div>
        <div id="status-sheet-content"></div>
      </div>
    </div>
    <script src="./prototype-data.js?v=20260520-12"></script>
    <script src="./app.js?v=20260523-7"></script>
  </body>
</html>
